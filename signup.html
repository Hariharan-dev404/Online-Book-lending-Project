<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    .image-side {
      width: 42%;
      background-image: url("signupim.jpg");
      background-size: cover;
      background-position: center;
      
    }

    .form-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background-color: #ffffff;
    }

    .form-side h1 {
      color: lightcoral;
      margin-bottom: 40px;
      text-align: center;
      font-size: 36px;
    }

    form {
      width: 100%;
      max-width: 400px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background-color: lightcoral;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background-color: #e07070;
    }

    @media screen and (max-width: 768px) {
      body {
        flex-direction: column;
      }
      .image-side {
        height: 200px;
      }
    }
  </style>

  <!-- Custom Alerts & Responsive CSS -->
  <link rel="stylesheet" href="assets/custom_alert.css">
  <link rel="stylesheet" href="assets/responsive.css">
</head>
<body>

  <div class="image-side"></div>

  <div class="form-side">
    <h1 style="font-size: 70px;">Welcome to Pageloft</h1>
    <form id="signupForm">
      <input type="text" id="firstName" placeholder="First Name" required />
      <input type="text" id="lastName" placeholder="Last Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
      <button type="submit">Sign Up</button>
      <p>If you already have an account <a href="index.html" style="color:rgb(5, 121, 253)">Login</a></p>
    </form>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
      }

      const name = firstName + " " + lastName;

      try {
        const response = await fetch("http://localhost:8000/api/register/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, email, password })
        });

        if (response.ok) {
          await showCustomAlert("Registration successful! Please login.");
          window.location.href = "index.html";
        } else {
          const data = await response.json();
          alert(data.error || "Registration failed");
        }
      } catch (err) {
        console.error("Error:", err);
        alert("Something went wrong during registration.");
      }
    });
  </script>


  <!-- Custom Alerts JS -->
  <script src="assets/custom_alert.js"></script>
</body>
</html>
