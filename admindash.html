<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Book Management</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; }
    .header { background-color: lightcoral; color: white; padding: 20px; text-align: center; font-size: 28px; font-weight: bold; }
    .container { padding: 30px; }
    table { width: 100%; border-collapse: collapse; background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    th, td { padding: 12px 20px; border: 1px solid #ddd; text-align: left; }
    th { background-color: lightcoral; color: white; }
    .edit-btn { background-color: orange; padding: 10px; border-radius: 10px; color: white; border: none; cursor: pointer; }
    .delete-btn { background-color: crimson; padding: 10px; border-radius: 10px; color: white; border: none; cursor: pointer; }
    .inputs { margin-bottom: 20px; display: flex; gap: 25px; flex-wrap: wrap; }
    .inputs input[type=text], .inputs input[type=number], .inputs input[type=file], .inputs select, .inputs textarea {
      padding: 8px; flex: 1; min-width: 150px;
    }
    textarea { max-height: 50px; max-width: 1000px; }
    button { padding: 10px; background-color: lightcoral; border: none; border-radius: 10px; color: white; cursor: pointer; margin-bottom: 20px;}
    .inputs button:hover { background-color: #e6645c; }
    .footer { margin-top: 40px; text-align: center; padding: 15px; background-color: lightcoral; color: white; }
    @media (max-width: 768px) {
      .inputs { flex-direction: column; }
      .inputs input, .inputs button, .inputs select, .inputs textarea { width: 100%; }
    }
  </style>
</head>
<body>

<div class="header">Admin Dashboard - Book Management</div>

<div class="container">
  <!-- Input Form -->
  <div class="inputs">
    <input type="text" id="title" placeholder="Book Title">
    <input type="text" id="author" placeholder="Author">
    <select id="genre">
      <option value="">Select Genre</option>
      <option value="Fiction">Fiction</option>
      <option value="Romance">Romance</option>
      <option value="Fantasy">Fantasy</option>
    </select>
    <input type="number" id="price" placeholder="Price (₹)">
    <input type="number" id="stock" placeholder="Stock">
    <input type="file" id="image" accept="image/*">
    <textarea id="description" placeholder="Book Description"></textarea>
  </div>
  <button onclick="addBook()">Add Book</button>
  
  <!-- Book Table -->
  <table id="bookTable">
    <thead>
      <tr>
        <th>Image</th>
        <th>Title</th>
        <th>Author</th>
        <th>Genre</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="footer">© 2025 Book Management</div>

<script>
  const API_URL = 'http://localhost:8000/api/books/';

  document.addEventListener("DOMContentLoaded", async function() {
    try {
      const response = await fetch("http://localhost:8000/api/user/", {
        credentials: "include"
      });
      if (!response.ok) {
        window.location.href = "index.html";
        return;
      }
      const userData = await response.json();
      if (userData.role !== 'admin') {
        alert("Access denied. Admin role required.");
        window.location.href = "user.html";
        return;
      }
      // Initial load
      loadBooks();
    } catch(e) {
      window.location.href = "index.html";
    }
  });

  async function loadBooks() {
    try {
      const response = await fetch(API_URL);
      const books = await response.json();
      const tbody = document.querySelector("#bookTable tbody");
      tbody.innerHTML = "";

      books.forEach((book) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-label="Image"><img src="${book.image}" alt="${book.title}" style="width:60px; height:80px; object-fit:cover;"></td>
          <td data-label="Title">${book.title}</td>
          <td data-label="Author">${book.author}</td>
          <td data-label="Genre">${book.genre}</td>
          <td data-label="Price">₹${book.price}</td>
          <td data-label="Stock">${book.stock}</td>
          <td data-label="Actions">
            <button class="edit-btn" onclick="editBook(${book.id}, '${book.title}', '${book.author}', '${book.genre}', ${book.price}, ${book.stock}, '${book.description.replace(/'/g, "\\'")}')">Edit</button>
            <button class="delete-btn" onclick="deleteBook(${book.id})">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    } catch (error) {
      console.error("Error loading books:", error);
    }
  }

  async function addBook() {
    const title = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();
    const genre = document.getElementById("genre").value;
    const price = document.getElementById("price").value.trim();
    const stock = document.getElementById("stock").value.trim();
    const description = document.getElementById("description").value.trim();
    const imageFile = document.getElementById("image").files[0];

    if (!title || !author || !genre || !["Fiction","Romance","Fantasy"].includes(genre) || !price || !stock || !description || !imageFile) {
      alert("Please fill all fields and select a valid genre!");
      return;
    }

    const formData = new FormData();
    formData.append('title', title);
    formData.append('author', author);
    formData.append('genre', genre);
    formData.append('price', price);
    formData.append('stock', stock);
    formData.append('description', description);
    formData.append('image', imageFile);
    formData.append('status', 'available');

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        credentials: "include",
        body: formData
      });
      if (response.ok) {
        loadBooks();
        clearInputs();
      } else {
        alert("Failed to add book.");
      }
    } catch (error) {
      console.error("Error adding book:", error);
    }
  }

  function clearInputs() {
    document.getElementById("title").value = "";
    document.getElementById("author").value = "";
    document.getElementById("genre").value = "";
    document.getElementById("price").value = "";
    document.getElementById("stock").value = "";
    document.getElementById("description").value = "";
    document.getElementById("image").value = "";
  }

  async function deleteBook(id) {
    if (confirm("Are you sure you want to delete this book?")) {
      try {
        const response = await fetch(`${API_URL}${id}/`, {
          method: 'DELETE',
          credentials: "include"
        });
        if (response.ok) {
          loadBooks();
        } else {
          alert("Failed to delete book.");
        }
      } catch (error) {
        console.error("Error deleting book:", error);
      }
    }
  }

  async function editBook(id, oldTitle, oldAuthor, oldGenre, oldPrice, oldStock, oldDesc) {
    const newTitle = prompt("Edit Title:", oldTitle);
    const newAuthor = prompt("Edit Author:", oldAuthor);
    const newGenre = prompt("Edit Genre (Fiction, Romance, Fantasy):", oldGenre);
    const newPrice = parseFloat(prompt("Edit Price:", oldPrice));
    const newStock = parseInt(prompt("Edit Stock:", oldStock));
    const newDescription = prompt("Edit Description:", oldDesc);

    if (newTitle && newAuthor && ["Fiction","Romance","Fantasy"].includes(newGenre) && !isNaN(newPrice) && !isNaN(newStock) && newDescription) {
      
      const formData = new FormData();
      formData.append('title', newTitle);
      formData.append('author', newAuthor);
      formData.append('genre', newGenre);
      formData.append('price', newPrice);
      formData.append('stock', newStock);
      formData.append('description', newDescription);

      try {
        const response = await fetch(`${API_URL}${id}/`, {
          method: 'PATCH',
          credentials: "include",
          body: formData
        });
        if (response.ok) {
          loadBooks();
        } else {
          alert("Failed to update book.");
        }
      } catch (error) {
        console.error("Error updating book:", error);
      }
    }
  }

  // Initial load handled by DOMContentLoaded

</script>

</body>
</html>
